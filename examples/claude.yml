# Caller: drop this at .github/workflows/claude.yml in a consuming repo.
# The whole per-repo file — never changes. Logic lives centrally in
# sebko/github-actions/.github/workflows/claude-mention.yml.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Required: caller grants the token scope the reusable workflow needs
    # (reusable workflows can't elevate above the caller). Read-only default → startup_failure.
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    uses: sebko/github-actions/.github/workflows/claude-mention.yml@v1
    secrets: inherit
