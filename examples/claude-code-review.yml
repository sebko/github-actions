# Caller: drop this at .github/workflows/claude-code-review.yml in a consuming repo.
# The whole per-repo file — it never changes. All logic lives centrally in
# sebko/github-actions/.github/workflows/claude-review.yml.
name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  review:
    # Required: a called reusable workflow can't elevate above the caller's
    # GITHUB_TOKEN, so the caller grants what the review needs. Without this,
    # repos with the default read-only token get a startup_failure.
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: sebko/github-actions/.github/workflows/claude-review.yml@v1
    secrets: inherit
