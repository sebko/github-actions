# Reusable: on-demand @claude runs on issues/PRs.
# Callers trigger on comment/issue/review events and delegate here with `secrets: inherit`.
name: Claude Code

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # write: @claude replies post PR/issue comments
      issues: write
      id-token: write
      actions: read # lets Claude read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Enable web tools (see note in claude-review.yml).
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebSearch", "WebFetch", "Read", "Edit", "Write", "Bash", "Glob", "Grep",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github_inline_comment__create_inline_comment"
                ]
              }
            }
          additional_permissions: |
            actions: read
