# Reusable: on-demand @claude runs on issues/PRs.
# Callers trigger on comment/issue/review events and delegate here with `secrets: inherit`.
name: Claude Code

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # NOTE: permissions are granted by the CALLER job (see examples/). The caller
    # must grant: contents:read, pull-requests:write, issues:write, id-token:write, actions:read.

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        # SHA-pinned (tags are mutable). Dependabot bumps this + the trailing comment.
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Enable web tools (see note in claude-review.yml).
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebSearch", "WebFetch", "Read", "Edit", "Write", "Bash", "Glob", "Grep",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github_inline_comment__create_inline_comment"
                ]
              }
            }
          additional_permissions: |
            actions: read
