# Reusable: on-demand @claude runs on issues/PRs.
# Callers trigger on comment/issue/review events and delegate here with `secrets: inherit`.
name: Claude Code

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # NOTE: permissions are granted by the CALLER job (see examples/). The caller
    # must grant: contents:read, pull-requests:write, issues:write, id-token:write, actions:read.

    steps:
      # REQUIRED. The action does NOT clone for itself — it needs a git repo in the
      # workspace, then fetches the PR's own branch itself (git fetch origin
      # --depth=20 <pr-branch>) and commits there. Removing this step fails the run
      # with "fatal: not a git repository". The ref checked out here doesn't matter
      # (issue_comment carries the default branch); the action re-points it.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        # SHA-pinned (tags are mutable). Dependabot bumps this + the trailing comment.
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Enable web tools (see note in claude-review.yml).
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebSearch", "WebFetch", "Read", "Edit", "Write", "Bash", "Glob", "Grep",
                  "mcp__github_comment__update_claude_comment",
                  "mcp__github_inline_comment__create_inline_comment"
                ]
              }
            }
          additional_permissions: |
            actions: read
